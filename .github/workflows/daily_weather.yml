name: Daily Field Weather Report

on:
  schedule:
    # GitHub cron is UTC. These are set for America/Toronto when on EDT (UTC-4):
    # - 08:00 EDT = 12:00 UTC  → today's forecast
    # - 18:00 EDT = 22:00 UTC  → tomorrow's forecast
    # When on EST (UTC-5) they will run at 07:00 and 17:00 local.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-weather:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install Pillow

      - name: Run weather bot
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python weather.py
