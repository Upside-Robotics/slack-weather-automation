name: Daily Field Weather Report

on:
  schedule:
    # GitHub cron is UTC. These are set for America/Toronto when on EDT (UTC-4):
    # - 04:00 EDT = 08:00 UTC
    # - 17:00 EDT = 21:00 UTC
    # When on EST (UTC-5) they will run at 03:00 and 16:00 local.
    - cron: "0 8 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install Pillow

      - name: Run weather bot
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python weather.py
