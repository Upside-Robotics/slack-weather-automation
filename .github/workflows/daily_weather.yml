name: Daily Field Weather Report

on:
  schedule:
    # GitHub cron is UTC. These are set for America/Toronto when on EDT (UTC-4):
    # - 07:30 EDT = 11:30 UTC
    # - 14:30 EDT = 18:30 UTC
    # When on EST (UTC-5) they will run at 06:30 and 13:30 local.
    - cron: "30 11 * * *"
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install Pillow

      - name: Run weather bot
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python weather.py
