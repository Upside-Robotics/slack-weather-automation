name: 3-Hour Rain Alert

on:
  schedule:
    # Every 15 minutes, 10:00–23:00 UTC (06:00–19:00 EDT) — daytime only
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rain-alert-3h:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run 3-hour rain alert
        env:
          RAIN_ALERT_WEBHOOK_URL: ${{ secrets.RAIN_ALERT_WEBHOOK_URL }}
        run: python3 rain_alert_3h.py
