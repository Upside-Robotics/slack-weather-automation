name: Build and Deploy

on:
  push:
    branches: ["**"]

env:
  AWS_REGION: ca-central-1
  ECR_REGISTRY: 905418281504.dkr.ecr.ca-central-1.amazonaws.com
  ECR_REPOSITORY: slack-weather-automation
  CONTAINER_NAME: slack-weather-automation

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Copy run scripts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "run-weather.sh,run-rain-alert-3h.sh,run-sensor-alert.sh"
          target: /home/ec2-user/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          IMAGE_URI: ${{ needs.build.outputs.image }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,IMAGE_URI
          script: |
            AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            docker pull $IMAGE_URI
            docker tag $IMAGE_URI ${{ env.CONTAINER_NAME }}:latest

            chmod +x /home/ec2-user/run-weather.sh \
                      /home/ec2-user/run-rain-alert-3h.sh \
                      /home/ec2-user/run-sensor-alert.sh

            (crontab -l 2>/dev/null \
               | grep -v 'run-weather.sh' \
               | grep -v 'run-rain-alert-3h.sh' \
               | grep -v 'run-sensor-alert.sh'; \
             echo "0 12 * * * /home/ec2-user/run-weather.sh >> /home/ec2-user/weather.log 2>&1"; \
             echo "0 22 * * * /home/ec2-user/run-weather.sh >> /home/ec2-user/weather.log 2>&1"; \
             echo "0 10-23 * * * /home/ec2-user/run-rain-alert-3h.sh >> /home/ec2-user/rain-alert-3h.log 2>&1"; \
             echo "*/30 * * * * /home/ec2-user/run-sensor-alert.sh >> /home/ec2-user/sensor-alert.log 2>&1") | crontab -

            sudo tee /etc/logrotate.d/weather > /dev/null <<'EOF'
            /home/ec2-user/weather.log /home/ec2-user/rain-alert-3h.log /home/ec2-user/sensor-alert.log {
                weekly
                rotate 4
                compress
                missingok
                notifempty
            }
            EOF

            docker image prune -f
